# Render Blueprint — Lazo Agent
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lazo-agent
    runtime: python
    buildCommand: ./render-build.sh
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DATABASE_URL
        fromDatabase:
          name: lazo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lazo-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
    autoDeploy: true
    healthCheckPath: /api/health
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70

databases:
  - name: lazo-db
    plan: starter
    postgresMajorVersion: 16
    ipAllowList: []

  - name: lazo-redis
    plan: starter
